name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    # Hebdo : job golden (deps pinnées) sans encombrer chaque PR
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported Python + NumPy 1.x
          - python-version: "3.9"
            numpy-spec: "numpy>=1.26,<2"
          # Newest Python + NumPy 2.x
          - python-version: "3.13"
            numpy-spec: "numpy>=2,<3"
          # Middle Python + NumPy 1.x (inverse vs newest-Python job)
          - python-version: "3.11"
            numpy-spec: "numpy>=1.26,<2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install and test
        run: |
          python -m pip install -U pip setuptools wheel
          # Resolve NumPy + OpenCV together so pip picks a compatible pair (e.g. NumPy 1.x → opencv 4.11.x).
          python -m pip install "${{ matrix.numpy-spec }}" "opencv-python-headless>=4.8"
          python -m pip install pytest
          python -m pip install --no-deps -e .
          python -m pytest -q -m "not golden"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Smoke install wheel
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install -U pip
          .venv-smoke/bin/python -m pip install dist/pykuwahara-*.whl
          .venv-smoke/bin/python -c "from pykuwahara import kuwahara; import numpy as np; import cv2; print(np.__version__, cv2.__version__)"

  coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and coverage
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install "numpy>=1.26,<3" "opencv-python-headless>=4.8" pytest pytest-cov
          python -m pip install --no-deps -e .
          python -m pytest tests/ -q -m "not golden" --cov=pykuwahara --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  golden:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned deps and golden extras
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install "numpy==2.0.2" "opencv-python-headless==4.10.0.84"
          python -m pip install -e ".[golden]"

      - name: Golden regression (strict + SSIM/PSNR ROI)
        env:
          CI: "true"
          GOLDEN_STRICT: "1"
        run: python -m pytest tests/test_golden_regression.py -v

      - name: Upload golden failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failure
          path: golden_failure/
          if-no-files-found: ignore
